<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Pro</title>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b1437;color:white;}
.top{display:flex;align-items:center;padding:15px;}
.title{font-size:22px;font-weight:bold;}
button{margin-left:10px;padding:8px 12px;border:none;border-radius:10px;background:#2d3d8b;color:white;cursor:pointer;}

.card{margin:15px;padding:15px;border-radius:15px;background:#1b2a6b;}
.txn{padding:12px;border-bottom:1px solid #2a3a7a;display:flex;justify-content:space-between;}
.name{font-weight:600;}
.green{color:#00e676;}
.red{color:#ff5252;}

#loader{position:fixed;bottom:20px;left:20px;right:20px;background:#1b2a6b;padding:10px;border-radius:10px;}
#bar{height:5px;background:#6f8cff;width:0%;}
</style>
</head>

<body>

<div class="top">
<div class="title">Finance Pro</div>
<button onclick="auth()">Connect Gmail</button>
<div id="status" style="margin-left:auto;">Ready</div>
</div>

<div class="card">
Net Balance
<div id="net" style="font-size:30px;">₹0</div>
</div>

<div id="list"></div>

<div id="loader">
<div id="prog">Waiting...</div>
<div id="bar"></div>
</div>

<script>

const CLIENT_ID="294448907552-42vl2af953es0vo0i44t9a0d5nbttg0b.apps.googleusercontent.com";

let tokenClient, token;
let txns=[];

/* FIXED ELEMENT REFERENCES */
const list = document.getElementById("list");
const net = document.getElementById("net");

function status(s){
document.getElementById("status").innerText=s;
}

function prog(d,t){
document.getElementById("prog").innerText=d+"/"+t;
document.getElementById("bar").style.width=(d/t*100)+"%";
}

/* AUTH */
function init(){
tokenClient = google.accounts.oauth2.initTokenClient({
client_id: CLIENT_ID,
scope: "https://www.googleapis.com/auth/gmail.readonly",
callback: (r)=>{
if(r.error){status("Auth failed");return;}
token = r.access_token;
scan();
}
});
status("Ready");
}

function auth(){
if(tokenClient) tokenClient.requestAccessToken();
}

/* FAST SCAN */
async function scan(){

status("Scanning...");
txns=[];

let res = await fetch(
"https://gmail.googleapis.com/gmail/v1/users/me/messages?q=from:alerts@axis.bank.in newer_than:90d",
{headers:{Authorization:"Bearer "+token}}
);

let data = await res.json();
let msgs = (data.messages||[]).slice(0,60);

let done = 0;

for(let m of msgs){

let r = await fetch(
"https://gmail.googleapis.com/gmail/v1/users/me/messages/"+m.id+"?format=metadata",
{headers:{Authorization:"Bearer "+token}}
);

let d = await r.json();

let text = d.snippet ? d.snippet.toLowerCase() : "";

let txn = parse(text);
if(txn) txns.push(txn);

done++;
prog(done,msgs.length);

}

/* fallback */
if(txns.length===0){
status("Deep scan...");
await deepScan(msgs);
}

render();
status("Done");

}

/* DEEP SCAN (FIXED) */
async function deepScan(msgs){

for(let m of msgs.slice(0,25)){

let r = await fetch(
"https://gmail.googleapis.com/gmail/v1/users/me/messages/"+m.id+"?format=full",
{headers:{Authorization:"Bearer "+token}}
);

let d = await r.json();

let text = extractBody(d);

let txn = parse(text.toLowerCase());
if(txn) txns.push(txn);

}

}

/* CLEAN BODY EXTRACTOR */
function extractBody(msg){

let body = "";

function decode(data){
return atob(data.replace(/-/g,'+').replace(/_/g,'/'));
}

function walk(parts){
for(let p of parts){
if(p.mimeType === "text/plain" && p.body?.data){
body += decode(p.body.data);
}
if(p.parts) walk(p.parts);
}
}

if(msg.payload?.parts){
walk(msg.payload.parts);
}else if(msg.payload?.body?.data){
body = decode(msg.payload.body.data);
}

return sanitize(body);

}

/* SANITIZER */
function sanitize(t){

return t
.replace(/content-type:.*/gi,'')
.replace(/content-transfer-encoding:.*/gi,'')
.replace(/content-disposition:.*/gi,'')
.replace(/htmlfilename|headersname|quoted-printable/gi,'')
.replace(/=\r?\n/g,'')
.replace(/\s+/g,' ')
.trim();

}

/* PARSER */
function parse(t){

let debit = t.match(/inr\s([\d,]+).*debited.*at\s\/?.*?\/([a-z0-9 ]+)/i);
let credit = t.match(/inr\s([\d,]+).*credited.*upi.*\/([^\/]+)\//i);

if(debit){
return {
amount: num(debit[1]),
type: "expense",
name: clean(debit[2])
};
}

if(credit){
return {
amount: num(credit[1]),
type: "income",
name: clean(credit[2])
};
}

return null;
}

function num(n){
return parseInt(n.replace(/,/g,""));
}

function clean(n){
return n
.replace(/[^a-z0-9 ]/gi,"")
.replace(/\s+/g," ")
.trim()
.toUpperCase();
}

/* RENDER */
function render(){

let inc = 0, exp = 0;
list.innerHTML = "";

txns.forEach(t=>{

if(t.type==="income") inc += t.amount;
else exp += t.amount;

let div = document.createElement("div");
div.className = "txn";

div.innerHTML = `
<div class="name">${t.name}</div>
<div class="${t.type==="income"?"green":"red"}">₹${t.amount}</div>
`;

list.appendChild(div);

});

net.innerText = "₹" + (inc - exp);

}

/* BOOT */
window.onload = () => gapi.load("client", init);

</script>

</body>
</html>
