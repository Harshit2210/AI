<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Pro X</title>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b1437;color:white;}
.top{display:flex;align-items:center;padding:15px;}
.title{font-size:22px;font-weight:bold;}
button{margin-left:10px;padding:8px 12px;border:none;border-radius:10px;background:#2d3d8b;color:white;}

.card{margin:15px;padding:15px;border-radius:15px;background:#1b2a6b;}
.txn{padding:12px;border-bottom:1px solid #2a3a7a;display:flex;justify-content:space-between;}
.name{font-weight:600;}
.cat{font-size:11px;opacity:.6;}
.green{color:#00e676;}
.red{color:#ff5252;}

.search{margin:15px;width:calc(100% - 30px);padding:10px;border-radius:10px;border:none;background:#111842;color:white;}

#loader{position:fixed;bottom:20px;left:20px;right:20px;background:#1b2a6b;padding:10px;border-radius:10px;}
#bar{height:5px;background:#6f8cff;width:0%;}
</style>
</head>

<body>

<div class="top">
<div class="title">Finance Pro X</div>
<button onclick="auth()">Connect</button>
<div id="status" style="margin-left:auto;">Ready</div>
</div>

<input class="search" id="search" placeholder="Search transactions">

<div class="card">
Net Balance
<div id="net" style="font-size:30px;">₹0</div>
</div>

<div id="list"></div>

<div id="loader">
<div id="prog">Waiting...</div>
<div id="bar"></div>
</div>

<script>

const CLIENT_ID="294448907552-42vl2af953es0vo0i44t9a0d5nbttg0b.apps.googleusercontent.com";

let tokenClient, token;
let txns=[];

/* CATEGORY */
function getCat(n){
n=n.toLowerCase();
if(n.includes("zomato")||n.includes("swiggy")) return "Food";
if(n.includes("uber")||n.includes("ola")) return "Travel";
if(n.includes("amazon")||n.includes("flipkart")) return "Shopping";
return "Other";
}

/* UI */
function status(s){statusEl.innerText=s;}
const statusEl=document.getElementById("status");

function prog(done,total){
document.getElementById("prog").innerText=done+"/"+total;
document.getElementById("bar").style.width=(done/total*100)+"%";
}

/* AUTH */
function init(){
tokenClient=google.accounts.oauth2.initTokenClient({
client_id:CLIENT_ID,
scope:"https://www.googleapis.com/auth/gmail.readonly",
callback:(r)=>{token=r.access_token;scan();}
});
}

function auth(){tokenClient.requestAccessToken();}

/* FAST SCAN (USING SNIPPETS) */
async function scan(){

status("Scanning fast...");
txns=[];

let res=await fetch(
"https://gmail.googleapis.com/gmail/v1/users/me/messages?q=from:alerts@axis.bank.in newer_than:90d",
{headers:{Authorization:"Bearer "+token}}
);

let data=await res.json();
let msgs=(data.messages||[]).slice(0,80);

let done=0;

for(let m of msgs){

let r=await fetch(
"https://gmail.googleapis.com/gmail/v1/users/me/messages/"+m.id+"?format=metadata",
{headers:{Authorization:"Bearer "+token}}
);

let d=await r.json();

/* USE SNIPPET (FAST) */
let text=(d.snippet||"").toLowerCase();

let txn=parse(text);

if(txn) txns.push(txn);

done++;
prog(done,msgs.length);

}

render();
status("Done");

/* if low results → deep scan */
if(txns.length<5) deepScan(msgs);

}

/* DEEP SCAN ONLY IF NEEDED */
async function deepScan(msgs){

status("Deep scan...");

for(let m of msgs.slice(0,30)){

let r=await fetch(
"https://gmail.googleapis.com/gmail/v1/users/me/messages/"+m.id,
{headers:{Authorization:"Bearer "+token}}
);

let d=await r.json();

let text=JSON.stringify(d).toLowerCase();

let txn=parse(text);

if(txn) txns.push(txn);

}

render();
status("Deep done");

}

/* STRONG PARSER */
function parse(t){

/* debit */
let d=t.match(/inr\s([\d,]+).*debited.*at\s(.+?)(\.|,)/i);

/* credit */
let c=t.match(/inr\s([\d,]+).*credited.*\/([^\/]+)\//i);

if(d){
return {
amount:num(d[1]),
type:"expense",
name:clean(d[2])
};
}

if(c){
return {
amount:num(c[1]),
type:"income",
name:clean(c[2])
};
}

return null;

}

function num(n){return parseInt(n.replace(/,/g,""));}

function clean(n){
return n
.replace(/[^a-z0-9 ]/gi,"")
.replace(/\s+/g," ")
.trim()
.toUpperCase();
}

/* RENDER */
function render(){

let inc=0,exp=0;

list.innerHTML="";

txns.forEach(t=>{

let cat=getCat(t.name);

if(t.type==="income") inc+=t.amount;
else exp+=t.amount;

let div=document.createElement("div");
div.className="txn";

div.innerHTML=
`<div>
<div class="name">${t.name}</div>
<div class="cat">${cat}</div>
</div>
<div class="${t.type==="income"?"green":"red"}">₹${t.amount}</div>`;

list.appendChild(div);

});

net.innerText="₹"+(inc-exp);

}

/* SEARCH */
search.oninput=e=>{
let q=e.target.value.toLowerCase();
list.innerHTML="";
txns.filter(t=>t.name.toLowerCase().includes(q))
.forEach(t=>{
let div=document.createElement("div");
div.className="txn";
div.innerHTML=`<span>${t.name}</span><span>₹${t.amount}</span>`;
list.appendChild(div);
});
};

/* BOOT */
window.onload=()=>gapi.load("client",init);

</script>

</body>
</html>
