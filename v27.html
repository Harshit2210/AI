<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Pro</title>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b1437;color:white;}
.top{display:flex;align-items:center;padding:15px;}
.title{font-size:22px;font-weight:bold;}
button{margin-left:10px;padding:8px 12px;border:none;border-radius:10px;background:#2d3d8b;color:white;cursor:pointer;}

.card{margin:15px;padding:15px;border-radius:15px;background:#1b2a6b;}
.txn{padding:12px;border-bottom:1px solid #2a3a7a;display:flex;justify-content:space-between;}
.name{font-weight:600;}
.green{color:#00e676;}
.red{color:#ff5252;}

#loader{position:fixed;bottom:20px;left:20px;right:20px;background:#1b2a6b;padding:10px;border-radius:10px;}
#bar{height:5px;background:#6f8cff;width:0%;}
</style>
</head>

<body>

<div class="top">
<div class="title">Finance Pro</div>
<button onclick="auth()">Connect Gmail</button>
<div id="status" style="margin-left:auto;">Ready</div>
</div>

<div class="card">
Net Balance
<div id="net" style="font-size:30px;">₹0</div>
</div>

<div id="list"></div>

<div id="loader">
<div id="prog">Waiting...</div>
<div id="bar"></div>
</div>

<script>

const CLIENT_ID="294448907552-42vl2af953es0vo0i44t9a0d5nbttg0b.apps.googleusercontent.com";

let tokenClient, token;
let txns=[];

const list = document.getElementById("list");
const net = document.getElementById("net");

function status(s){
document.getElementById("status").innerText=s;
}

function prog(d,t){
document.getElementById("prog").innerText=d+"/"+t;
document.getElementById("bar").style.width=(d/t*100)+"%";
}

/* AUTH */
function init(){
tokenClient = google.accounts.oauth2.initTokenClient({
client_id: CLIENT_ID,
scope: "https://www.googleapis.com/auth/gmail.readonly",
callback: (r)=>{
if(r.error){status("Auth failed");return;}
token = r.access_token;
scan();
}
});
status("Ready");
}

function auth(){
tokenClient.requestAccessToken();
}

/* SCAN (LIMIT 30 ONLY) */
async function scan(){

status("Scanning...");
txns=[];

let res = await fetch(
"https://gmail.googleapis.com/gmail/v1/users/me/messages?q=from:alerts@axis.bank.in newer_than:90d",
{headers:{Authorization:"Bearer "+token}}
);

let data = await res.json();
let msgs = (data.messages||[]).slice(0,30);

let done = 0;

for(let m of msgs){

let r = await fetch(
"https://gmail.googleapis.com/gmail/v1/users/me/messages/"+m.id+"?format=full",
{headers:{Authorization:"Bearer "+token}}
);

let d = await r.json();

/* CLEAN FULL EMAIL TEXT */
let text = extractText(d).toLowerCase();

let txn = parse(text);

if(txn && txn.amount > 0 && txn.amount < 500000){
txns.push(txn);
}

done++;
prog(done,msgs.length);

}

render();
status("Done");

}

/* EXTRACT REAL TEXT ONLY */
function extractText(msg){

let text = "";

function decode(data){
return atob(data.replace(/-/g,'+').replace(/_/g,'/'));
}

function walk(part){
if(!part) return;

if(part.mimeType === "text/plain" && part.body?.data){
text += decode(part.body.data) + " ";
}

if(part.mimeType === "text/html" && part.body?.data){
text += decode(part.body.data).replace(/<[^>]*>/g,' ') + " ";
}

if(part.parts){
part.parts.forEach(walk);
}
}

walk(msg.payload);

return sanitize(text);

}

/* REMOVE JUNK */
function sanitize(t){

return t
.replace(/content-type:.*/gi,'')
.replace(/content-transfer-encoding:.*/gi,'')
.replace(/content-disposition:.*/gi,'')
.replace(/charset=[^ ]*/gi,'')
.replace(/=\r?\n/g,'')
.replace(/\s+/g,' ')
.trim();

}

/* PARSER (REAL AXIS FORMAT FIX) */
function parse(t){

let debit = t.match(
/(?:inr|rs\.?)\s?([\d,]+).*?(debited|spent|paid).*?(?:at|to)\s(?:upi|vpa|merchant|)?\s*\/?([^\/,.-]+)/i
);

let credit = t.match(
/(?:inr|rs\.?)\s?([\d,]+).*?(credited|received).*?(?:from|upi).*?\/([^\/,.-]+)/i
);

if(debit){
return {
amount: num(debit[1]),
type: "expense",
name: cleanName(debit[3])
};
}

if(credit){
return {
amount: num(credit[1]),
type: "income",
name: cleanName(credit[3])
};
}

return null;
}

function num(n){
return parseInt(n.replace(/,/g,""));
}

/* CLEAN MERCHANT NAME (FIXED) */
function cleanName(n){

return n
.replace(/upi|vpa|ref|no|id|txn|transaction|paid|to|at/gi,'')
.replace(/[^a-zA-Z ]/g,' ')
.replace(/\s+/g,' ')
.trim()
.toUpperCase()
.split(' ')
.filter(w => w.length > 2)
.join(' ')
.slice(0,25);

}

/* RENDER */
function render(){

let inc=0, exp=0;
list.innerHTML="";

txns.forEach(t=>{

if(t.type==="income") inc+=t.amount;
else exp+=t.amount;

let div=document.createElement("div");
div.className="txn";

div.innerHTML=`
<div class="name">${t.name}</div>
<div class="${t.type==="income"?"green":"red"}">₹${t.amount}</div>
`;

list.appendChild(div);

});

net.innerText="₹"+(inc-exp);

}

/* BOOT */
window.onload=()=>gapi.load("client",init);

</script>

</body>
</html>
