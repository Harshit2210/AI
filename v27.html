<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Finance Pro</title>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b1437;color:white;}
.top{display:flex;align-items:center;padding:15px;}
.title{font-size:22px;font-weight:bold;}
button{margin-left:10px;padding:8px 12px;border:none;border-radius:10px;background:#2d3d8b;color:white;cursor:pointer;}

.card{margin:15px;padding:15px;border-radius:15px;background:#1b2a6b;}
.txn{padding:12px;border-bottom:1px solid #2a3a7a;}
.row{display:flex;justify-content:space-between;}
.small{font-size:12px;opacity:0.7;margin-top:3px;}

.green{color:#00e676;}
.red{color:#ff5252;}
</style>
</head>

<body>

<div class="top">
<div class="title">AI Finance Pro</div>
<button onclick="auth()">Connect Gmail</button>
<div id="status" style="margin-left:auto;">Ready</div>
</div>

<div class="card">
Net Balance
<div id="net" style="font-size:30px;">₹0</div>
</div>

<div id="list"></div>

<script>

const CLIENT_ID="294448907552-42vl2af953es0vo0i44t9a0d5nbttg0b.apps.googleusercontent.com";

let tokenClient, token;
let txns=[];

const list = document.getElementById("list");
const net = document.getElementById("net");

function status(s){
document.getElementById("status").innerText=s;
}

/* AUTH */
function init(){
tokenClient = google.accounts.oauth2.initTokenClient({
client_id: CLIENT_ID,
scope: "https://www.googleapis.com/auth/gmail.readonly",
callback: (r)=>{
if(r.error){status("Auth failed");return;}
token = r.access_token;
scan();
}
});
status("Ready");
}

function auth(){
tokenClient.requestAccessToken();
}

/* SCAN */
async function scan(){

status("Scanning...");
txns=[];

let res = await fetch(
"https://gmail.googleapis.com/gmail/v1/users/me/messages?q=from:alerts@axis.bank.in newer_than:90d",
{headers:{Authorization:"Bearer "+token}}
);

let data = await res.json();
let msgs = (data.messages||[]).slice(0,30);

for(let m of msgs){

let r = await fetch(
"https://gmail.googleapis.com/gmail/v1/users/me/messages/"+m.id+"?format=full",
{headers:{Authorization:"Bearer "+token}}
);

let d = await r.json();

let text = extractText(d);
text = normalize(text);

let txn = parseTransaction(text);

if(txn && txn.amount){
txns.push(txn);
}

}

/* remove duplicates */
txns = dedupe(txns);

render();
status("Done");

}

/* EXTRACT EMAIL TEXT */
function extractText(msg){

let text="";

function decode(data){
return atob(data.replace(/-/g,'+').replace(/_/g,'/'));
}

function walk(p){
if(!p) return;

if(p.mimeType==="text/plain" && p.body?.data){
text += decode(p.body.data)+" ";
}

if(p.mimeType==="text/html" && p.body?.data){
text += decode(p.body.data).replace(/<[^>]*>/g,' ')+" ";
}

if(p.parts) p.parts.forEach(walk);
}

walk(msg.payload);

return text;

}

/* CLEAN NOISE */
function normalize(t){

return t
.replace(/\n/g,' ')
.replace(/\s+/g,' ')
.replace(/(₹|inr|rs\.?)/gi,'₹')

/* REMOVE AXIS JUNK */
.replace(/block sms|blocked|customer|fraud|alert|axis bank|dear customer|important/gi,' ')

.replace(/content-type:.*/gi,'')
.replace(/content-transfer-encoding:.*/gi,'')
.trim();

}

/* CORE PARSER */
function parseTransaction(t){

t = t.replace(/\s{2,}/g,' ');

/* DEBIT */
let debit = t.match(
/₹\s?([\d,]+).*?(debited|spent|paid).*?(?:at|to|via)?\s*([a-z0-9 ]{3,})/i
);

/* CREDIT (FIXED BLANK ISSUE) */
let credit = t.match(
/₹\s?([\d,]+).*?(credited|received).*?(?:from|upi|vpa|via)?\s*\/?\s*([a-z0-9 ]{3,})/i
);

if(debit){

return {
amount: parseInt(debit[1].replace(/,/g,'')),
type: "expense",
name: cleanMerchant(debit[3]),
category: categorize(debit[3])
};

}

if(credit){

return {
amount: parseInt(credit[1].replace(/,/g,'')),
type: "income",
name: cleanMerchant(credit[3]),
category: "INCOME"
};

}

return null;
}

/* MERCHANT CLEANING */
function cleanMerchant(n){

return n
.replace(/upi|vpa|ref|txn|id|to|at|via|paid|received|from/gi,'')
.replace(/[^a-zA-Z ]/g,' ')
.replace(/\s+/g,' ')
.trim()
.toUpperCase()
.split(' ')
.filter(w=>w.length>2)
.join(' ')
.slice(0,25);

}

/* CATEGORY SYSTEM */
function categorize(name){

name = name.toLowerCase();

if(name.match(/zomato|swiggy|food|restaurant/)) return "FOOD";
if(name.match(/uber|ola|irctc|train|flight|fuel/)) return "TRAVEL";
if(name.match(/amazon|flipkart|myntra|shop/)) return "SHOPPING";

return "OTHER";
}

/* REMOVE DUPLICATES */
function dedupe(arr){

let seen = new Set();

return arr.filter(t=>{
let key = t.amount + t.name + t.type;
if(seen.has(key)) return false;
seen.add(key);
return true;
});

}

/* RENDER UI */
function render(){

let inc=0, exp=0;
list.innerHTML="";

txns.forEach(t=>{

if(t.type==="income") inc+=t.amount;
else exp+=t.amount;

let div=document.createElement("div");
div.className="txn";

div.innerHTML=`
<div class="row">
<div>${t.name}</div>
<div class="${t.type==="income"?"green":"red"}">₹${t.amount}</div>
</div>
<div class="small">${t.category}</div>
`;

list.appendChild(div);

});

net.innerText="₹"+(inc-exp);

}

/* BOOT */
window.onload=()=>gapi.load("client",init);

</script>

</body>
</html>
