<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Pro</title>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
body{margin:0;font-family:sans-serif;background:#0b1437;color:white;}
.top{display:flex;align-items:center;padding:15px;}
.title{font-size:22px;font-weight:bold;}
button{margin-left:10px;padding:8px 12px;border:none;border-radius:10px;background:#2d3d8b;color:white;}
.card{margin:15px;padding:15px;border-radius:15px;background:#1b2a6b;}
.txn{padding:10px;border-bottom:1px solid #2a3a7a;display:flex;justify-content:space-between;}
.green{color:#00e676;}
.red{color:#ff5252;}
#loader{position:fixed;bottom:20px;left:20px;right:20px;background:#1b2a6b;padding:10px;border-radius:10px;display:none;}
#bar{height:5px;background:#6f8cff;width:0%;}
</style>
</head>

<body>

<div class="top">
<div class="title">Finance Pro</div>
<button onclick="auth()">Connect Gmail</button>
<div id="status" style="margin-left:auto;">Ready</div>
</div>

<div class="card">
Net Flow
<div id="net" style="font-size:30px;">₹0</div>
</div>

<div class="card" id="ins"></div>

<div id="list"></div>

<div id="loader">
<div id="prog">Loading...</div>
<div id="bar"></div>
</div>

<script>

const CLIENT_ID="294448907552-42vl2af953es0vo0i44t9a0d5nbttg0b.apps.googleusercontent.com";

let tokenClient, token, txns=[];

function status(s){document.getElementById("status").innerText=s;}

function show(){loader.style.display="block";}
function hide(){loader.style.display="none";}
function prog(d,t){
document.getElementById("prog").innerText=`${d}/${t}`;
document.getElementById("bar").style.width=(d/t*100)+"%";
}

/* AUTH */

function init(){
tokenClient=google.accounts.oauth2.initTokenClient({
client_id:CLIENT_ID,
scope:"https://www.googleapis.com/auth/gmail.readonly",
callback:(r)=>{
token=r.access_token;
scan();
}
});
status("Ready");
}

function auth(){tokenClient.requestAccessToken();}

/* FAST SCAN */

async function scan(){

status("Scanning...");
show();

let res=await fetch(
"https://gmail.googleapis.com/gmail/v1/users/me/messages?q=from:(hdfc OR icici OR sbi OR axis OR kotak) newer_than:90d",
{headers:{Authorization:"Bearer "+token}}
);

let data=await res.json();
let msgs=(data.messages||[]).slice(0,50);

txns=[];

let i=0;

for(let batch=0;batch<msgs.length;batch+=5){

let part=msgs.slice(batch,batch+5);

let results=await Promise.all(part.map(m=>getMail(m.id)));

results.forEach(t=>{if(t) txns.push(t);});

i+=part.length;
prog(i,msgs.length);

}

/* DONE */

hide();
render();
status("Done");

}

/* GET MAIL (FIXED BODY PARSE) */

async function getMail(id){

let r=await fetch(
"https://gmail.googleapis.com/gmail/v1/users/me/messages/"+id+"?format=full",
{headers:{Authorization:"Bearer "+token}}
);

let d=await r.json();

/* extract body */

let body="";

try{
let parts=d.payload.parts||[];
for(let p of parts){
if(p.mimeType==="text/plain"){
body=atob(p.body.data.replace(/-/g,'+').replace(/_/g,'/'));
break;
}
}
}catch(e){}

if(!body) body=JSON.stringify(d);

/* parse */

return parse(body);

}

/* CLEAN PARSER */

function parse(t){

t=t.toLowerCase();

/* strict filter */
if(
!t.includes("credited") &&
!t.includes("debited") &&
!t.includes("spent")
) return null;

/* amount */
let m=t.match(/(?:rs\.?|₹|inr)\s?([0-9,]+)/i);
if(!m) return null;

let amt=parseInt(m[1].replace(/,/g,""));

/* type */
let type=t.includes("credited")?"income":"expense";

/* NAME FIX (NO MORE MTA) */

let name="";

let upi=t.match(/to\s([a-z0-9@.\- ]+)/i);
if(upi) name=upi[1];

let at=t.match(/at\s([a-z0-9 .\-]+)/i);
if(at) name=at[1];

if(!name){
let merchant=t.match(/paid to ([a-z0-9 .\-]+)/i);
if(merchant) name=merchant[1];
}

if(!name) return null;

/* clean */
name=name.replace(/[^a-z0-9 ]/gi,"").trim().toUpperCase();

return {amount:amt,type,name};

}

/* UI */

function render(){

let inc=0,exp=0;

list.innerHTML="";

txns.forEach(t=>{

if(t.type==="income") inc+=t.amount;
else exp+=t.amount;

let div=document.createElement("div");
div.className="txn";
div.innerHTML=
`<span>${t.name}</span>
<span class="${t.type==="income"?"green":"red"}">₹${t.amount}</span>`;

list.appendChild(div);

});

net.innerText="₹"+(inc-exp);

ins.innerHTML=
`Income ₹${inc}<br>Expense ₹${exp}<br>Txns ${txns.length}`;

}

/* boot */

window.onload=()=>gapi.load("client",init);

</script>

</body>
</html>
